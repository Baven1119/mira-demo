<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiden</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a0c0f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;}
  .app{width:420px;height:780px;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;position:relative;border:0.5px solid rgba(255,255,255,0.05);}
  .bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;background:url('https://megapx-assets.dcard.tw/images/4893ee6d-06d6-4ff6-9502-1e063199f1fc/640.webp') center/cover no-repeat;}
  .bg::after{content:'';position:absolute;inset:0;background:rgba(8,10,14,0.75);}
  .top{position:relative;z-index:10;padding:20px 22px 14px;display:flex;align-items:center;gap:14px;border-bottom:0.5px solid rgba(255,255,255,0.05);background:rgba(8,10,14,0.5);}
  .avatar{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#8a9ab0,#4a5a72 50%,#1a2030);flex-shrink:0;border:1px solid rgba(100,130,180,0.2);}
  .info{flex:1;}
  .name{font-size:15px;font-weight:500;color:#c8d4e0;letter-spacing:0.02em;}
  .status{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;color:rgba(100,140,180,.4);margin-top:2px;display:flex;align-items:center;gap:5px;}
  .dot{width:4px;height:4px;border-radius:50%;background:rgba(100,140,180,.6);animation:blink 3s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .doing{font-family:'DM Mono',monospace;font-size:9px;color:rgba(160,180,200,.25);letter-spacing:.07em;padding:3px 10px;border-radius:20px;border:0.5px solid rgba(100,130,180,.12);white-space:nowrap;}
  .chat{flex:1;position:relative;z-index:10;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.04) transparent;}
  .msg{display:flex;flex-direction:column;gap:4px;animation:in .28s ease forwards;opacity:0;transform:translateY(5px);}
  .msg.user{align-items:flex-end;}.msg.aiden{align-items:flex-start;}
  @keyframes in{to{opacity:1;transform:translateY(0);}}
  .sender{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.15);padding:0 2px;}
  .bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.8;}
  .msg.user .bubble{background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.1);border-bottom-right-radius:3px;color:#c0c8d4;}
  .msg.aiden .bubble{background:rgba(20,30,50,.7);border:0.5px solid rgba(80,110,160,.2);border-bottom-left-radius:3px;color:#b8c8d8;font-size:13.5px;letter-spacing:0.01em;}
  .action-line{display:block;color:rgba(130,145,160,.38);font-style:italic;font-size:11.5px;margin-bottom:6px;letter-spacing:0.01em;}
  .thought{max-width:80%;padding:5px 10px;border-left:1.5px solid rgba(80,110,160,.2);font-size:11px;line-height:1.6;color:rgba(255,255,255,.18);font-style:italic;font-family:'DM Mono',monospace;}
  .typing-wrap{display:flex;flex-direction:column;gap:4px;align-items:flex-start;}
  .typing{display:flex;align-items:center;gap:5px;padding:10px 14px;background:rgba(20,30,50,.7);border:0.5px solid rgba(80,110,160,.15);border-radius:14px;border-bottom-left-radius:3px;width:fit-content;}
  .td{width:4px;height:4px;border-radius:50%;background:rgba(100,140,180,.5);animation:tdot 1.1s ease infinite;}
  .td:nth-child(2){animation-delay:.18s;}.td:nth-child(3){animation-delay:.36s;}
  @keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-3px);opacity:1}}
  .choices{position:relative;z-index:10;padding:8px 16px 4px;display:flex;flex-direction:column;gap:5px;}
  .clabel{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.12);margin-bottom:1px;}
  .crow{display:flex;gap:6px;flex-wrap:wrap;}
  .choice{padding:7px 12px;border-radius:10px;border:0.5px solid rgba(255,255,255,.07);background:rgba(8,10,14,.5);font-family:'Inter',sans-serif;font-size:11.5px;font-weight:300;color:rgba(255,255,255,.3);cursor:pointer;transition:all .15s;flex:1;min-width:100px;line-height:1.35;text-align:left;}
  .choice:hover{border-color:rgba(100,140,180,.4);color:rgba(160,200,240,.85);background:rgba(20,40,80,.6);}
  .choice.action{border-color:rgba(120,100,80,.2);color:rgba(180,160,130,.3);font-style:italic;}
  .choice.action:hover{border-color:rgba(160,130,90,.4);color:rgba(200,175,140,.8);background:rgba(40,30,20,.6);}
  .choice.tool{border-color:rgba(60,100,80,.2);color:rgba(120,170,140,.3);}
  .choice.tool:hover{border-color:rgba(80,140,110,.4);color:rgba(140,200,165,.8);background:rgba(20,50,40,.6);}
  .bottom{position:relative;z-index:10;border-top:0.5px solid rgba(255,255,255,.04);background:rgba(8,10,14,.7);}
  .input-row{padding:10px 14px 14px;display:flex;gap:8px;align-items:flex-end;}
  textarea{flex:1;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.07);border-radius:10px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:300;color:#c0c8d4;resize:none;outline:none;line-height:1.5;min-height:38px;max-height:90px;transition:border-color .15s;}
  textarea::placeholder{color:rgba(255,255,255,.12);}
  textarea:focus{border-color:rgba(80,120,180,.3);}
  .send{width:36px;height:36px;border-radius:50%;border:0.5px solid rgba(80,120,180,.2);background:rgba(80,120,180,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(120,160,210,.6);transition:all .15s;flex-shrink:0;}
  .send:hover{background:rgba(80,120,180,.15);border-color:rgba(80,120,180,.4);}
  .send svg{width:14px;height:14px;fill:currentColor;}
</style>
</head>
<body>
<div class="app">
  <div class="bg"></div>

  <div class="top">
    <div class="avatar"></div>
    <div class="info">
      <div class="name">Aiden</div>
      <div class="status"><div class="dot"></div>在線 · 車庫裡</div>
    </div>
    <div class="doing" id="doing">正在拆化油器</div>
  </div>

  <div class="chat" id="chat">
    <div class="msg aiden">
      <span class="sender">AIDEN</span>
      <div class="thought">有人來了。不打算停下來。</div>
      <div class="bubble">
        <span class="action-line">——沒有抬頭。</span>
        鏈條鬆了。正在弄。<br><br>你來了。
      </div>
    </div>
  </div>

  <div class="choices" id="choices">
    <div class="clabel">此刻</div>
    <div class="crow" id="choices-row"></div>
  </div>

  <div class="bottom">
    <div class="input-row">
      <textarea id="inp" placeholder="跟 Aiden 說話…" rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
      <button class="send" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>

<script>
let history = [];
const doings = ['正在拆化油器','調整鏈條中','檢查煞車皮','換火星塞','清洗汽缸','鎖緊螺絲'];
const thoughts = ['有人來了。不打算停下來。','他問了。我想了一下。','手沒有停。','他靠過來了。','這個問題讓我放下扳手。','他還在這裡。'];
let ti = 0;

window.onload = () => setDefaultChoices();

function setDefaultChoices(){
  updateChoices(['你在修什麼？','⟶ 蹲下來看他在做什麼','把扳手遞給他']);
}

function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){
    e.preventDefault();
    send();
  }
}

function pick(type, text){
  const isAction = type==='action';
  const isTool = type==='tool';
  const content = (isAction||isTool)?`[行為：${text.replace('⟶ ','')}]`:text;
  addMsg('user', null, text, isAction||isTool);
  history.push({role:'user', content});
  getReply();
}

async function send(){
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';
  addMsg('user', null, text, false);
  history.push({role:'user', content:text});
  await getReply();
}

async function getReply(){
  addTyping();
  try{
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history})
    });
    removeTyping();
    if(!res.ok) throw new Error();
    const data = await res.json();
    const raw = data.content.map(c=>c.text||'').join('');
    let parsed;
    try{ parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e){ parsed = {reply:raw, actions:[]}; }
    const reply = parsed.reply||raw;
    const actions = parsed.actions||[];
    history.push({role:'assistant', content:reply});
    addMsg('aiden', thoughts[ti++%thoughts.length], reply, false);
    updateChoices(actions);
    document.getElementById('doing').textContent = doings[Math.floor(Math.random()*doings.length)];
  }catch(e){
    removeTyping();
    addMsg('aiden', null, '——手沒有停。\n\n你說什麼？', false);
    setDefaultChoices();
  }
}

function updateChoices(actions){
  const row = document.getElementById('choices-row');
  const box = document.getElementById('choices');
  row.innerHTML='';
  if(!actions.length){box.style.display='none';return;}
  box.style.display='flex';
  actions.forEach(a=>{
    const isAction = a.startsWith('⟶');
    const isTool = !isAction&&(a.includes('遞')||a.includes('拿')||a.includes('扳手')||a.includes('工具')||a.includes('火星塞')||a.includes('套筒')||a.includes('鏈條'));
    const btn = document.createElement('button');
    btn.className = 'choice'+(isAction?' action':isTool?' tool':'');
    btn.textContent = a;
    btn.onclick = ()=>pick(isAction?'action':isTool?'tool':'say', a);
    row.appendChild(btn);
  });
}

function formatBubble(text){
  return text
    .split('\n')
    .map(line => {
      if(line.startsWith('——')){
        return `<span class="action-line">${line}</span>`;
      }
      return line;
    })
    .join('<br>');
}

function addMsg(role, thought, text, isAction){
  const area = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg '+role;
  let html = `<span class="sender">${role==='user'?'YOU':'AIDEN'}</span>`;
  if(thought&&role==='aiden') html+=`<div class="thought">${thought}</div>`;
  const content = role==='aiden' ? formatBubble(text) : text.replace(/\n/g,'<br>');
  html+=`<div class="bubble${isAction?' action':''}">${content}</div>`;
  div.innerHTML = html;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addTyping(){
  const area = document.getElementById('chat');
  const div = document.createElement('div');
  div.id='typing';div.className='typing-wrap';
  div.innerHTML='<span class="sender">AIDEN</span><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}

function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}
</script>
</body>
</html>
